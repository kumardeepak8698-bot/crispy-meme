name: Build Debug APK
  on:
    push:
      branches: [ main ]
    workflow_dispatch:
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
        - uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.9'
        - name: Create dirs and run scripts
          run: |
            mkdir -p ~/DeviceCloner/app/src/main/java/com/cloner/ui
            mkdir -p ~/DeviceCloner/app/src/main/res/layout
            mkdir -p ~/DeviceCloner/app/src/main/res/values
            mkdir -p ~/DeviceCloner/app/src/main/res/xml
            mkdir -p ~/DeviceCloner/app/src/main/res/mipmap-hdpi
            mkdir -p ~/DeviceCloner/app/src/main/res/mipmap-mdpi
            mkdir -p ~/DeviceCloner/app/src/main/res/mipmap-xhdpi
            mkdir -p ~/DeviceCloner/app/src/main/res/mipmap-xxhdpi
            mkdir -p ~/DeviceCloner/app/src/main/res/mipmap-xxxhdpi
            mkdir -p ~/DeviceCloner/gradle/wrapper ~/DeviceCloner/app
            bash build.gradle.kts
            bash settings.gradle.kts
            bash gradle.properties
            bash gradle-wrapper.properties
            bash AndroidManifest.xml
            bash MainActivity.kt
            bash AppAdapter.kt
            bash AppInfo.kt
            bash CloneManager.kt
            bash DeviceRandomizer.kt
            bash activity_main.xml
            bash file_paths.xml
            bash themes.xml
            bash app/build.gradle.kts
            bash proguard-rules.pro
        - name: Write item_app.xml
          run: printf '%s' '' | base64 -d > ~/DeviceCloner/app/src/main/res/layout/item_app.xml
        - name: Launcher icons
          run: |
            sudo apt-get install -y imagemagick -q
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              convert -size 108x108 xc:#e94560 ~/DeviceCloner/app/src/main/res/mipmap-${d}/ic_launcher.png
              convert -size 108x108 xc:#e94560 ~/DeviceCloner/app/src/main/res/mipmap-${d}/ic_launcher_round.png
            done
        - name: Gradle wrapper
          working-directory: ~/DeviceCloner
          run: gradle wrapper --gradle-version 8.9
        - name: Debug keystore
          run: keytool -genkeypair -keystore ~/DeviceCloner/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        - name: Build APK
          working-directory: ~/DeviceCloner
          run: ./gradlew assembleDebug
        - uses: actions/upload-artifact@v4
          with:
            name: debug-apk
            path: ~/DeviceCloner/app/build/outputs/apk/debug/*.apk
  