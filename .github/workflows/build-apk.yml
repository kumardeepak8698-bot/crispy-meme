name: Build Debug APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Set up Gradle
          uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.9'

        - name: Create directories
          run: |
            mkdir -p /home/runner/DeviceCloner/app/src/main/java/com/cloner/ui
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/layout
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/values
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/xml
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-hdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-mdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xhdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xxhdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xxxhdpi
            mkdir -p /home/runner/DeviceCloner/gradle/wrapper
            mkdir -p /home/runner/DeviceCloner/app

        - name: Write all project files
          run: |
            echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/AndroidManifest.xml
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/java/com/cloner/ui/AppAdapter.kt
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/java/com/cloner/ui/AppInfo.kt
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/java/com/cloner/CloneManager.kt
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/java/com/cloner/DeviceRandomizer.kt
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/java/com/cloner/MainActivity.kt
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/res/layout/activity_main.xml
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/res/layout/item_app.xml
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/res/xml/file_paths.xml
          echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/res/values/themes.xml
          echo '' | base64 -d > /home/runner/DeviceCloner/app/build.gradle.kts
          echo 'cGx1Z2lucyB7CiAgICBpZCgiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iKSB2ZXJzaW9uICI4LjcuMyIgYXBwbHkgZmFsc2UKICAgIGlkKCJvcmcuamV0YnJhaW5zLmtvdGxpbi5hbmRyb2lkIikgdmVyc2lvbiAiMi4xLjAiIGFwcGx5IGZhbHNlCn0=' | base64 -d > /home/runner/DeviceCloner/build.gradle.kts
          echo 'ZGlzdHJpYnV0aW9uQmFzZT1HUkFETEVfVVNFUl9IT01FCmRpc3RyaWJ1dGlvblBhdGg9d3JhcHBlci9kaXN0cwpkaXN0cmlidXRpb25Vcmw9aHR0cHNcOi8vc2VydmljZXMuZ3JhZGxlLm9yZy9kaXN0cmlidXRpb25zL2dyYWRsZS04LjktYmluLnppcAp6aXBTdG9yZUJhc2U9R1JBRExFX1VTRVJfSE9NRQp6aXBTdG9yZVBhdGg9d3JhcHBlci9kaXN0cw==' | base64 -d > /home/runner/DeviceCloner/gradle/wrapper/gradle-wrapper.properties
          echo 'b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXgyMDQ4bSAtRGZpbGUuZW5jb2Rpbmc9VVRGLTgKYW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmtvdGxpbi5jb2RlLnN0eWxlPW9mZmljaWFsCmFuZHJvaWQubm9uVHJhbnNpdGl2ZVJDbGFzcz10cnVl' | base64 -d > /home/runner/DeviceCloner/gradle.properties
          echo 'LWtlZXAgY2xhc3MgY29tLmNsb25lci4qKiB7ICo7IH0KLWtlZXAgY2xhc3MgKiBpbXBsZW1lbnRzIGNvbS5nb29nbGUuZ3Nvbi5UeXBlQWRhcHRlckZhY3RvcnkKLWtlZXAgY2xhc3MgKiBpbXBsZW1lbnRzIGNvbS5nb29nbGUuZ3Nvbi5Kc29uU2VyaWFsaXplcgota2VlcCBjbGFzcyAqIGltcGxlbWVudHMgY29tLmdvb2dsZS5nc29uLkpzb25EZXNlcmlhbGl6ZXI=' | base64 -d > /home/runner/DeviceCloner/app/proguard-rules.pro
          echo '' | base64 -d > /home/runner/DeviceCloner/settings.gradle.kts

            echo "All files written!"
            find /home/runner/DeviceCloner -type f | sort

        - name: Create launcher icons
          run: |
            sudo apt-get install -y imagemagick -q
            for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              convert -size 108x108 xc:#e94560 /home/runner/DeviceCloner/app/src/main/res/mipmap-${dir}/ic_launcher.png
              convert -size 108x108 xc:#e94560 /home/runner/DeviceCloner/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            done

        - name: Generate Gradle wrapper
          working-directory: /home/runner/DeviceCloner
          run: gradle wrapper --gradle-version 8.9

        - name: Generate debug keystore
          run: keytool -genkeypair -keystore /home/runner/DeviceCloner/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

        - name: Build debug APK
          working-directory: /home/runner/DeviceCloner
          run: ./gradlew assembleDebug --stacktrace

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: debug-apk
            path: /home/runner/DeviceCloner/app/build/outputs/apk/debug/*.apk
  