name: Build Debug APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Set up Gradle
          uses: gradle/actions/setup-gradle@v4
          with:
            gradle-version: '8.9'

        - name: Create project structure from scripts
          run: |
            mkdir -p /home/runner/DeviceCloner/app/src/main/java/com/cloner/ui
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/layout
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/values
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/xml
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-hdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-mdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xhdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xxhdpi
            mkdir -p /home/runner/DeviceCloner/app/src/main/res/mipmap-xxxhdpi
            mkdir -p /home/runner/DeviceCloner/gradle/wrapper
            bash build.gradle.kts
            bash settings.gradle.kts
            bash gradle.properties
            bash gradle-wrapper.properties
            bash AndroidManifest.xml
            bash MainActivity.kt
            bash AppAdapter.kt
            bash AppInfo.kt
            bash CloneManager.kt
            bash DeviceRandomizer.kt
            bash activity_main.xml
            bash file_paths.xml
            bash themes.xml
            bash app/build.gradle.kts
            bash proguard-rules.pro

        - name: Write item_app.xml via base64
          run: |
            echo '' | base64 -d > /home/runner/DeviceCloner/app/src/main/res/layout/item_app.xml
            echo "First bytes:"; xxd /home/runner/DeviceCloner/app/src/main/res/layout/item_app.xml | head -2

        - name: Create launcher icons
          run: |
            sudo apt-get install -y imagemagick -q
            for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              convert -size 108x108 xc:#e94560 /home/runner/DeviceCloner/app/src/main/res/mipmap-${dir}/ic_launcher.png
              convert -size 108x108 xc:#e94560 /home/runner/DeviceCloner/app/src/main/res/mipmap-${dir}/ic_launcher_round.png
            done

        - name: Generate Gradle wrapper
          working-directory: /home/runner/DeviceCloner
          run: gradle wrapper --gradle-version 8.9

        - name: Generate debug keystore
          run: keytool -genkeypair -keystore /home/runner/DeviceCloner/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

        - name: Build debug APK
          working-directory: /home/runner/DeviceCloner
          run: ./gradlew assembleDebug

        - name: Upload APK as artifact
          uses: actions/upload-artifact@v4
          with:
            name: debug-apk
            path: /home/runner/DeviceCloner/app/build/outputs/apk/debug/*.apk
  